<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recycle Study</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Recycle Study</h1>
    </header>

    <!-- 로그인/등록 화면 -->
    <div id="login-view" class="view">
      <div class="form-group">
        <label for="email-input">이메일</label>
        <input type="email" id="email-input" placeholder="example@email.com">
      </div>
      <button id="register-btn" class="btn btn-primary">디바이스 등록</button>
      <p id="login-hint" class="hint">이메일 인증 후 서비스를 이용할 수 있습니다.</p>
    </div>

    <!-- 인증 대기 화면 -->
    <div id="pending-view" class="view hidden">
      <div class="pending-message">
        <p>이메일 인증 링크를 확인해주세요.</p>
        <p class="email-display"></p>
      </div>
      <button id="check-auth-btn" class="btn btn-secondary">인증 확인</button>
      <button id="reset-btn" class="btn btn-text">다른 이메일로 등록</button>
    </div>

    <!-- 메인 화면 (인증 완료 후) -->
    <div id="main-view" class="view hidden">
      <div class="user-info">
        <span id="user-email"></span>
      </div>

      <div id="next-review-info" class="next-review-info hidden">
        <span id="next-review-text"></span>
      </div>

      <!-- 복습 주기 선택 -->
      <div class="form-group">
        <label for="cycle-select">복습 주기</label>
        <select id="cycle-select" class="cycle-select">
          <!-- 동적으로 옵션 추가 -->
        </select>
      </div>

      <button id="save-url-btn" class="btn btn-primary btn-large">
        현재 페이지 저장
      </button>

      <div id="save-result" class="result hidden">
        <p class="result-title">저장 완료!</p>
        <div class="schedule-list">
          <p>복습 예정일:</p>
          <ul id="schedule-dates"></ul>
        </div>
      </div>

      <hr class="divider">

      <!-- 주기 관리 버튼 -->
      <button id="cycle-manage-btn" class="btn btn-secondary">복습 주기 관리</button>

      <!-- 주기 관리 섹션 -->
      <div id="cycle-section" class="hidden">
        <h3>나의 복습 주기</h3>
        <ul id="cycle-list" class="cycle-list"></ul>
        <button id="cycle-add-btn" class="btn btn-secondary btn-small">+ 새 주기 추가</button>
      </div>

      <button id="notification-time-btn" class="btn btn-secondary">알림 시간 설정</button>

      <div id="notification-section" class="hidden">
        <h3>알림 시간</h3>
        <div class="form-group">
          <label for="notification-time-input">매일 알림 받을 시간</label>
          <input type="time" id="notification-time-input">
        </div>
        <button id="notification-time-save-btn" class="btn btn-primary btn-small">저장</button>
      </div>

      <button id="show-devices-btn" class="btn btn-secondary">디바이스 관리</button>

      <div id="devices-section" class="hidden">
        <h3>등록된 디바이스</h3>
        <ul id="devices-list" class="devices-list"></ul>
      </div>

      <button id="logout-btn" class="btn btn-text">로그아웃</button>
    </div>

    <!-- 에러/메시지 표시 영역 -->
    <div id="message-area" class="message-area hidden"></div>

    <!-- 로딩 표시 -->
    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
    </div>
  </div>

  <!-- 주기 폼 모달 -->
  <div id="cycle-modal" class="modal hidden">
    <div class="modal-content">
      <h3 id="cycle-modal-title">새 복습 주기</h3>
      <form id="cycle-form">
        <div class="form-group">
          <label for="cycle-title-input">주기 이름</label>
          <input type="text" id="cycle-title-input" placeholder="예: 시험 대비 단기 암기">
        </div>
        <div class="form-group">
          <label>복습 간격 (등록 시점 기준)</label>
          <div id="cycle-durations-container">
            <!-- 동적으로 추가 -->
          </div>
          <button type="button" id="add-duration-btn" class="btn btn-text btn-small">+ 간격 추가</button>
        </div>
        <div class="form-actions">
          <button type="button" id="cycle-form-cancel" class="btn btn-secondary">취소</button>
          <button type="submit" id="cycle-form-submit" class="btn btn-primary">저장</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
